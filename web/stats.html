<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tempmail Stats</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="12" fill="%23136f63"/%3E%3Cpath d="M12 20h40v28H12z" fill="%23fff"/%3E%3Cpath d="M12 20l20 16 20-16" fill="none" stroke="%23136f63" stroke-width="5" stroke-linejoin="round"/%3E%3Cpath d="M12 48l15-15m25 15L37 33" fill="none" stroke="%23d8eee8" stroke-width="4"/%3E%3C/svg%3E'>
  <style>
    :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f6f7f9; color: #1b1f24; }
    main { max-width: 980px; margin: 0 auto; padding: 28px 20px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
    h1 { margin: 0; font-size: 26px; }
    a.button { border-radius: 6px; background: #136f63; color: #fff; padding: 10px 14px; font-weight: 700; text-decoration: none; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d9dde3; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px 14px; border-bottom: 1px solid #d9dde3; text-align: left; vertical-align: top; }
    th { font-size: 13px; color: #4d5967; background: #eef1f4; }
    tr:last-child td { border-bottom: 0; }
    .count { font-weight: 800; }
    .meta, .empty { color: #697483; }
    .error { color: #8a1f1b; font-weight: 650; }
    @media (prefers-color-scheme: dark) {
      body { background: #121417; color: #e8eaed; }
      table { background: #1a1f25; border-color: #333b45; }
      th, td { border-color: #333b45; }
      th { color: #bac3cf; background: #242b33; }
      .meta, .empty { color: #aab3bd; }
      .error { color: #ffbbb6; }
    }
    @media (max-width: 720px) {
      header { align-items: flex-start; flex-direction: column; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid #d9dde3; padding: 10px 0; }
      td { border: 0; padding: 6px 12px; }
      td::before { content: attr(data-label); display: block; color: #697483; font-size: 12px; font-weight: 750; margin-bottom: 2px; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Active Inboxes</h1>
      <div id="lastRefresh" class="meta"></div>
    </div>
    <a class="button" href="{{.BasePath}}/">Inbox</a>
  </header>
  <div id="content" class="empty">Loading...</div>
</main>
<script>
const basePath = "{{.BasePath}}";
const api = path => `${basePath}${path}`;

async function loadStats() {
  const res = await fetch(api("/api/stats"));
  if (!res.ok) {
    document.getElementById("content").innerHTML = `<div class="error">${escapeHTML(await res.text())}</div>`;
    return;
  }
  const data = await res.json();
  document.getElementById("lastRefresh").textContent = `Last refresh ${new Date(data.generated).toLocaleString()}`;
  render(data.inboxes || []);
}

function render(inboxes) {
  const root = document.getElementById("content");
  if (!inboxes.length) {
    root.innerHTML = `<div class="empty">No active inboxes.</div>`;
    return;
  }
  root.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Address</th>
          <th>Messages</th>
          <th>Opened</th>
          <th>Last refresh</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${inboxes.map(inbox => `
          <tr>
            <td data-label="Address">${escapeHTML(inbox.address)}</td>
            <td data-label="Messages" class="count">${inbox.messageCount}</td>
            <td data-label="Opened">${new Date(inbox.created).toLocaleString()}</td>
            <td data-label="Last refresh">${new Date(inbox.seen).toLocaleString()}</td>
            <td data-label="Status">${inbox.error ? `<span class="error">${escapeHTML(inbox.error)}</span>` : "OK"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[ch]));
}

loadStats();
setInterval(loadStats, 3000);
</script>
</body>
</html>
